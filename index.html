<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Karate Quiz">
    <meta name="theme-color" content="#dc2626">

    <title>Karate Quiz</title>
    <style>

        html, body { width: 100%; height: 100%; }

        .screen { display: none; }
        .screen.active { display: block; }
        .center { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #333; margin: 20px 0; font-size: 28px; }
        h2 { font-size: 20px; margin: 15px 0; }
        p { text-align: center; color: #666; margin-bottom: 30px; }
        .section { background: white; padding: 20px; margin: 15px 0; border-radius: 8px; }
        
        button { 
            padding: 8px 10px; 
            margin: 3px; 
            border: 2px solid #333; 
            background: white; 
            cursor: pointer; 
            border-radius: 4px; 
            font-size: 12px;
            min-height: 40px;
            min-width: 40px;
            -webkit-user-select: none;
            user-select: none;
        }
        
        button:active { opacity: 0.8; }
        button.selected { background: #dc2626; color: white; border-color: #dc2626; }
        
        button.start { 
            background: #dc2626; 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 16px; 
            font-size: 16px; 
            margin-top: 20px;
            min-height: 50px;
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 4px; 
            margin: 15px 0; 
        }
        
        .flex { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            margin: 15px 0; 
        }
        
        .card { 
            background: #dc2626; 
            color: white; 
            padding: 60px 20px; 
            text-align: center; 
            border-radius: 8px; 
            margin: 30px 0; 
            font-size: 32px; 
            font-weight: bold; 
            cursor: pointer; 
            user-select: none;
            -webkit-user-select: none;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card.revealed { background: #1f2937; }
        
        .buttons-group { 
            display: flex; 
            gap: 8px; 
            margin: 20px 0; 
        }
        
        .btn-green { 
            background: #10b981; 
            color: white; 
            border: none; 
            flex: 1; 
            padding: 14px; 
            border-radius: 4px;
            min-height: 48px;
            font-size: 14px;
        }
        
        .btn-red { 
            background: #ef4444; 
            color: white; 
            border: none; 
            flex: 1; 
            padding: 14px; 
            border-radius: 4px;
            min-height: 48px;
            font-size: 14px;
        }
        
        .btn-blue { 
            background: #0ea5e9; 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border-radius: 4px;
            min-height: 48px;
            font-size: 14px;
        }
        
        .progress { 
            background: #e0e0e0; 
            height: 8px; 
            border-radius: 4px; 
            margin: 20px 0; 
        }
        
        .progress-fill { 
            background: #dc2626; 
            height: 100%; 
            transition: width 0.3s; 
        }
        
        .score-text { 
            text-align: center; 
            color: #666; 
            margin: 10px 0; 
            font-size: 14px; 
        }
        
        .result { 
            text-align: center; 
            background: white; 
            padding: 40px; 
            border-radius: 8px; 
            margin: 40px auto; 
        }
        
        .result h1 { font-size: 36px; }
        .result .number { font-size: 56px; color: #dc2626; margin: 20px 0; }
        .result .percent { font-size: 24px; color: #333; }
        
        .label { 
            color: #666; 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 10px; 
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }
        
        .top-bar button {
            margin: 0;
            padding: 8px 12px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div id="config-screen" class="screen active">
    <div class="center">
        <h1>🥋 Karate Teknik Quiz</h1>
        <p>Test din viden om japanske teknikker</p>
        
        <div class="section">
            <h2>Vælg pensum:</h2>
            <div class="grid" id="levels"></div>
            <button onclick="selectAllLevels()" style="width: 100%; background: #f0f0f0; color: #0ea5e9; border: 1px solid #ccc;">Vælg alle</button>
        </div>
        
        <div class="section">
            <h2>Vælg kategorier:</h2>
            <div class="flex" id="categories"></div>
            <button onclick="selectAllCategories()" style="width: 100%; background: #f0f0f0; color: #0ea5e9; border: 1px solid #ccc;">Vælg alle</button>
        </div>
        
        <button class="start" ontouchend="startQuiz()" onclick="startQuiz()">Start Quiz</button>
    </div>
</div>

<div id="quiz-screen" class="screen">
    <div class="center">
        <div class="top-bar">
            <button ontouchend="goBack()" onclick="goBack()">← Tilbage</button>
            <span id="progress-text" style="font-size: 14px; color: #666; flex: 1; text-align: right;"></span>
        </div>
        <div class="progress"><div class="progress-fill" id="progress-bar"></div></div>
        
        <div class="card" id="quiz-card" ontouchend="revealAnswer()" onclick="revealAnswer()">
            <div id="card-content"></div>
        </div>
        
        <button class="btn-blue" ontouchend="speak()" onclick="speak()">🔊 Lyt til japansk</button>
        
        <div class="buttons-group" id="feedback-buttons" style="display: none;">
            <button class="btn-green" ontouchend="markCorrect()" onclick="markCorrect()">✓ Vidste det</button>
            <button class="btn-red" ontouchend="markWrong()" onclick="markWrong()">✗ Vidste det ikke</button>
        </div>
        
        <div class="score-text">Rigtige: <span id="correct-count">0</span> / <span id="current-count">0</span></div>
    </div>
</div>

<div id="result-screen" class="screen">
    <div class="center">
        <div class="result">
            <h1>✅ Quiz færdig!</h1>
            <div class="number" id="result-score"></div>
            <div class="percent" id="result-percent"></div>
            <button class="start" ontouchend="goBack()" onclick="goBack()" style="margin-top: 30px;">← Tilbage til opsætning</button>
        </div>
    </div>
</div>

let selectedLevels = [];
let selectedCategories = [];
let quizItems = [];
let currentIndex = 0;
let revealed = false;
let correctCount = 0;
let currentJapanese = '';

function getAllLevels() {
    const order = ['12. kyu', '11. kyu', '10. kyu', '9. kyu', '8. kyu', '7. kyu', '6. kyu', '5. kyu', '4. kyu', '3. kyu', '2. kyu', '1. kyu', '1. Dan', '2. Dan', '3. Dan'];
    const unique = Array.from(new Set(allData.map(d => d.niveau)));
    return unique.sort((a, b) => order.indexOf(a) - order.indexOf(b));
}

function getAllCategories() {
    return Array.from(new Set(allData.map(d => d.kategori))).sort();
}

function initConfig() {
    selectedLevels = ['12. kyu'];
    selectedCategories = ['Spark', 'Stillinger', 'Stød og slag', 'Parader'];
    renderConfig();
}

function renderConfig() {
    const levelsHtml = getAllLevels().map(level => 
        `<button ontouchend="toggleLevel('${level}')" onclick="toggleLevel('${level}')" class="${selectedLevels.includes(level) ? 'selected' : ''}">${level}</button>`
    ).join('');
    document.getElementById('levels').innerHTML = levelsHtml;
    
    const categoriesHtml = getAllCategories().map(cat => 
        `<button ontouchend="toggleCategory('${cat}')" onclick="toggleCategory('${cat}')" class="${selectedCategories.includes(cat) ? 'selected' : ''}">${cat}</button>`
    ).join('');
    document.getElementById('categories').innerHTML = categoriesHtml;
}

function toggleLevel(level) {
    if (selectedLevels.includes(level)) {
        selectedLevels = selectedLevels.filter(l => l !== level);
    } else {
        selectedLevels.push(level);
    }
    renderConfig();
}

function toggleCategory(cat) {
    if (selectedCategories.includes(cat)) {
        selectedCategories = selectedCategories.filter(c => c !== cat);
    } else {
        selectedCategories.push(cat);
    }
    renderConfig();
}

function selectAllLevels() {
    selectedLevels = getAllLevels();
    renderConfig();
}

function selectAllCategories() {
    selectedCategories = getAllCategories();
    renderConfig();
}

function startQuiz() {
    if (selectedLevels.length === 0 || selectedCategories.length === 0) {
        alert('Vælg mindst ét niveau og en kategori!');
        return;
    }
    
    quizItems = allData.filter(d => 
        selectedLevels.includes(d.niveau) && selectedCategories.includes(d.kategori)
    ).sort(() => Math.random() - 0.5);
    
    currentIndex = 0;
    revealed = false;
    correctCount = 0;
    
    showScreen('quiz-screen');
    renderQuiz();
}

function renderQuiz() {
    const item = quizItems[currentIndex];
    currentJapanese = item.japansk;
    
    const percent = ((currentIndex) / quizItems.length) * 100;
    document.getElementById('progress-bar').style.width = percent + '%';
    document.getElementById('progress-text').textContent = (currentIndex + 1) + ' / ' + quizItems.length;
    
    if (revealed) {
        document.getElementById('card-content').innerHTML = '<div class="label">Dansk svar:</div>' + item.dansk;
        document.getElementById('quiz-card').ontouchend = null;
        document.getElementById('quiz-card').onclick = null;
        document.getElementById('feedback-buttons').style.display = 'flex';
    } else {
        document.getElementById('card-content').innerHTML = item.japansk;
        document.getElementById('quiz-card').ontouchend = function(e) { e.preventDefault(); revealAnswer(); };
        document.getElementById('quiz-card').onclick = function() { revealAnswer(); };
        document.getElementById('feedback-buttons').style.display = 'none';
    }
    
    document.getElementById('quiz-card').className = revealed ? 'card revealed' : 'card';
    document.getElementById('correct-count').textContent = correctCount;
    document.getElementById('current-count').textContent = currentIndex;
}

function revealAnswer() {
    if (revealed) return;
    revealed = true;
    renderQuiz();
}

function speak() {
    const utterance = new SpeechSynthesisUtterance(currentJapanese);
    utterance.lang = 'ja-JP';
    utterance.rate = 0.8;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
}

function markCorrect() {
    correctCount++;
    nextQuestion();
}

function markWrong() {
    nextQuestion();
}

function nextQuestion() {
    currentIndex++;
    revealed = false;
    
    if (currentIndex >= quizItems.length) {
        showResult();
    } else {
        renderQuiz();
    }
}

function showResult() {
    const percent = Math.round((correctCount / quizItems.length) * 100);
    document.getElementById('result-score').textContent = correctCount + ' / ' + quizItems.length;
    document.getElementById('result-percent').textContent = percent + '%';
    showScreen('result-screen');
}

function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(name).classList.add('active');
}

function goBack() {
    showScreen('config-screen');
    initConfig();
}

initConfig();
</script>
