<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Karate Quiz</title>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f0f0; padding: 20px; overflow-x: hidden; }
        .screen { display: none; }
        .screen.active { display: block; }
        .center { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #333; margin: 20px 0; font-size: 28px; }
        h2 { font-size: 20px; margin: 15px 0; }
        p { text-align: center; color: #666; margin-bottom: 30px; }
        .section { background: white; padding: 20px; margin: 15px 0; border-radius: 8px; }
        
        button { 
            padding: 12px 16px; 
            margin: 6px; 
            border: 2px solid #333; 
            background: white; 
            cursor: pointer; 
            border-radius: 4px; 
            font-size: 14px;
            min-height: 44px;
            min-width: 44px;
            -webkit-user-select: none;
            user-select: none;
        }
        
        button:active { opacity: 0.8; }
        button.selected { background: #dc2626; color: white; border-color: #dc2626; }
        
        button.start { 
            background: #dc2626; 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 16px; 
            font-size: 16px; 
            margin-top: 20px;
            min-height: 50px;
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); 
            gap: 8px; 
            margin: 15px 0; 
        }
        
        .flex { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            margin: 15px 0; 
        }
        
        .card { 
            background: #dc2626; 
            color: white; 
            padding: 60px 20px; 
            text-align: center; 
            border-radius: 8px; 
            margin: 30px 0; 
            font-size: 32px; 
            font-weight: bold; 
            cursor: pointer; 
            user-select: none;
            -webkit-user-select: none;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card.revealed { background: #1f2937; }
        
        .buttons-group { 
            display: flex; 
            gap: 8px; 
            margin: 20px 0; 
        }
        
        .btn-green { 
            background: #10b981; 
            color: white; 
            border: none; 
            flex: 1; 
            padding: 14px; 
            border-radius: 4px;
            min-height: 48px;
            font-size: 14px;
        }
        
        .btn-red { 
            background: #ef4444; 
            color: white; 
            border: none; 
            flex: 1; 
            padding: 14px; 
            border-radius: 4px;
            min-height: 48px;
            font-size: 14px;
        }
        
        .btn-speak { 
            background: #0ea5e9; 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border-radius: 4px;
            min-height: 48px;
            font-size: 14px;
        }
        
        .progress { 
            background: #e0e0e0; 
            height: 8px; 
            border-radius: 4px; 
            margin: 20px 0; 
        }
        
        .progress-fill { 
            background: #dc2626; 
            height: 100%; 
            transition: width 0.3s; 
        }
        
        .score-text { 
            text-align: center; 
            color: #666; 
            margin: 10px 0; 
            font-size: 14px; 
        }
        
        .result { 
            text-align: center; 
            background: white; 
            padding: 40px; 
            border-radius: 8px;
        }
        
        .result h1 { font-size: 36px; }
        .result .number { font-size: 56px; color: #dc2626; margin: 20px 0; }
        .result .percent { font-size: 24px; color: #333; }
        
        .label { 
            color: #666; 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 10px; 
        }
    </style>
</head>
<body>

<div class="center">

<!-- CONFIG SCREEN -->
<div id="config-screen" class="screen active">
    <h1>🥋 Karate Teknik Quiz</h1>
    <p>Test din viden om japanske teknikker</p>
    
    <div class="section">
        <h2>Vælg pensum:</h2>
        <div class="grid" id="levels-group"></div>
    </div>
    
    <div class="section">
        <h2>Vælg kategorier:</h2>
        <div class="flex" id="categories-group"></div>
    </div>
    
    <button class="start" onclick="startQuiz()">Start Quiz</button>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz-screen" class="screen">
    <button style="background: #999; margin-bottom: 10px;" onclick="goBack()">← Tilbage</button>
    <div class="progress"><div class="progress-fill" id="progress-bar"></div></div>
    <div class="score-text"><span id="progress-text">1 / 10</span></div>
    
    <div class="card" id="quiz-card" onclick="revealAnswer()">
        <div id="card-content"></div>
    </div>
    
    <button class="btn-speak" onclick="speak()">🔊 Lyt til japansk</button>
    
    <div class="buttons-group" id="feedback-buttons" style="display: none;">
        <button class="btn-green" onclick="markCorrect()">✓ Vidste det</button>
        <button class="btn-red" onclick="markWrong()">✗ Vidste det ikke</button>
    </div>
    
    <div class="score-text">Rigtige: <span id="correct-count">0</span></div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen" class="screen">
    <div class="result">
        <h1>✅ Quiz færdig!</h1>
        <div class="number" id="result-score"></div>
        <div class="percent" id="result-percent"></div>
        <button class="start" onclick="goBack()" style="margin-top: 30px;">← Tilbage til opsætning</button>
    </div>
</div>

</div>

<script>
const allData = [{niveau:"12. kyu",kategori:"Spark",japansk:"Mae hiza geri",dansk:"Frontalt knæspark"},{niveau:"12. kyu",kategori:"Stillinger",japansk:"Anza",dansk:"Skrædderstilling"},{niveau:"12. kyu",kategori:"Stillinger",japansk:"Fudo dachi",dansk:"Udgangsstilling"},{niveau:"12. kyu",kategori:"Stillinger",japansk:"Heiko Dachi",dansk:"Parallelstilling"},{niveau:"12. kyu",kategori:"Stillinger",japansk:"Seiza",dansk:"Siddende stilling"},{niveau:"12. kyu",kategori:"Stillinger",japansk:"Yoi dachi",dansk:"Klarstilling"},{niveau:"12. kyu",kategori:"Stød og slag",japansk:"Seiken chudan tsuki",dansk:"Stød mod mellemgulvet"},{niveau:"12. kyu",kategori:"Stød og slag",japansk:"Seiken gedan tsuki",dansk:"Stød mod skridtet"},{niveau:"12. kyu",kategori:"Stød og slag",japansk:"Seiken jodan tsuki",dansk:"Stød mod hovedet"},{niveau:"11. kyu",kategori:"Parader",japansk:"Jodan uke",dansk:"Opadgående parade"},{niveau:"11. kyu",kategori:"Spark",japansk:"Haisoku kin geri",dansk:"Skridtspark med vristen"},{niveau:"11. kyu",kategori:"Stillinger",japansk:"Uchi hachi ji dachi",dansk:"Stilling med indadvendte tæer"},{niveau:"11. kyu",kategori:"Stød og slag",japansk:"Haito uchi",dansk:"Slag med håndfladerand"},{niveau:"10. kyu",kategori:"Spark",japansk:"Yoko keage geri",dansk:"Sidespjærk med tåspids"},{niveau:"10. kyu",kategori:"Spark",japansk:"Yoko kekomi",dansk:"Sidespjærk med fodsål"},{niveau:"10. kyu",kategori:"Stillinger",japansk:"Kiba dachi",dansk:"Riderstilling"},{niveau:"10. kyu",kategori:"Stillinger",japansk:"Sanchin dachi",dansk:"Dyb pyramidestilling"},{niveau:"10. kyu",kategori:"Stillinger",japansk:"Zenkutsu dachi",dansk:"Forsprang stilling"},{niveau:"10. kyu",kategori:"Parader",japansk:"Gedan barai",dansk:"Nedadgående fejning"},{niveau:"10. kyu",kategori:"Parader",japansk:"Chudan uke",dansk:"Midtersparede parade"},{niveau:"10. kyu",kategori:"Stød og slag",japansk:"Uraken uchi",dansk:"Omvendt knoslag"},{niveau:"10. kyu",kategori:"Stød og slag",japansk:"Shuto uchi",dansk:"Håndkantsslag"},{niveau:"9. kyu",kategori:"Spark",japansk:"Mawashi geri",dansk:"Cirkulært spark"},{niveau:"9. kyu",kategori:"Spark",japansk:"Ushiro geri",dansk:"Bagudgående spark"},{niveau:"9. kyu",kategori:"Stillinger",japansk:"Hangetsu dachi",dansk:"Halvmånestilling"},{niveau:"9. kyu",kategori:"Stillinger",japansk:"Hachiji dachi",dansk:"Åben stilling"},{niveau:"9. kyu",kategori:"Parader",japansk:"Soto uke",dansk:"Udadgående parade"},{niveau:"9. kyu",kategori:"Parader",japansk:"Uchi uke",dansk:"Indadgående parade"},{niveau:"9. kyu",kategori:"Stød og slag",japansk:"Empi uchi",dansk:"Albueslag"},{niveau:"9. kyu",kategori:"Stød og slag",japansk:"Tettsui uchi",dansk:"Knytnæverandslag"},{niveau:"8. kyu",kategori:"Spark",japansk:"Gyaku mawashi geri",dansk:"Cirkulært spark fra bagsiden"},{niveau:"8. kyu",kategori:"Spark",japansk:"Mae tobi geri",dansk:"Springende forespjærk"},{niveau:"8. kyu",kategori:"Spark",japansk:"Tobi yoko geri",dansk:"Springende sidespjærk"},{niveau:"8. kyu",kategori:"Stillinger",japansk:"Gyaku zenkutsu dachi",dansk:"Omvendt forsprang stilling"},{niveau:"8. kyu",kategori:"Stillinger",japansk:"Kokutsu dachi",dansk:"Bagtyngnet stilling"},{niveau:"8. kyu",kategori:"Parader",japansk:"Shuto uke",dansk:"Håndkantsparade"},{niveau:"8. kyu",kategori:"Parader",japansk:"Age uke",dansk:"Opadgående parade"},{niveau:"8. kyu",kategori:"Parader",japansk:"Morote uke",dansk:"Dobbelt parade"},{niveau:"8. kyu",kategori:"Stød og slag",japansk:"Nukite",dansk:"Fingerpegestød"},{niveau:"7. kyu",kategori:"Spark",japansk:"Tobi mae mawashi geri",dansk:"Springende cirkulært forespjærk"},{niveau:"7. kyu",kategori:"Spark",japansk:"Tobi gyaku mawashi geri",dansk:"Springende cirkulært spark fra bagsiden"},{niveau:"7. kyu",kategori:"Spark",japansk:"Hiza geri",dansk:"Knæspark"},{niveau:"7. kyu",kategori:"Stillinger",japansk:"Shiko dachi",dansk:"Sumo-agtig stilling"},{niveau:"7. kyu",kategori:"Parader",japansk:"Juji uke",dansk:"Korsparade"},{niveau:"7. kyu",kategori:"Parader",japansk:"Kake uke",dansk:"Krogs-parade"},{niveau:"7. kyu",kategori:"Parader",japansk:"Hiza barai",dansk:"Knæfejning"},{niveau:"7. kyu",kategori:"Stød og slag",japansk:"Tate empi uchi",dansk:"Lodret albueslag"},{niveau:"7. kyu",kategori:"Stød og slag",japansk:"Yoko empi uchi",dansk:"Sidealbueslag"},{niveau:"6. kyu",kategori:"Spark",japansk:"Tobi mae ushiro geri",dansk:"Springende bagudgående forespjærk"},{niveau:"6. kyu",kategori:"Spark",japansk:"Fumikomi waza",dansk:"Trampespark"},{niveau:"6. kyu",kategori:"Stillinger",japansk:"Musubi dachi",dansk:"Lukket stilling"},{niveau:"6. kyu",kategori:"Stillinger",japansk:"Neko ashi dachi",dansk:"Katstilling"},{niveau:"6. kyu",kategori:"Parader",japansk:"Osae uke",dansk:"Trykkeparade"},{niveau:"6. kyu",kategori:"Parader",japansk:"Mawashi barai",dansk:"Cirkulær fejning"},{niveau:"6. kyu",kategori:"Stød og slag",japansk:"Tate nukite",dansk:"Lodret fingerpegestød"},{niveau:"5. kyu",kategori:"Spark",japansk:"Sune ate",dansk:"Skinnebenspark"},{niveau:"5. kyu",kategori:"Spark",japansk:"Kaeshi geri",dansk:"Modspark"},{niveau:"5. kyu",kategori:"Stillinger",japansk:"Seisan dachi",dansk:"Halvmånestilling"},{niveau:"5. kyu",kategori:"Parader",japansk:"Sukui uke",dansk:"Skål-parade"},{niveau:"5. kyu",kategori:"Parader",japansk:"Otoshi uke",dansk:"Nedadslående parade"},{niveau:"5. kyu",kategori:"Stød og slag",japansk:"Gyaku tsuki",dansk:"Krydsstød"}];

let selectedLevels = [];
let selectedCategories = [];
let quizItems = [];
let currentIndex = 0;
let revealed = false;
let correctCount = 0;
let currentJapanese = '';

function getAllLevels() {
    const order = ['12. kyu', '11. kyu', '10. kyu', '9. kyu', '8. kyu', '7. kyu', '6. kyu', '5. kyu'];
    const unique = Array.from(new Set(allData.map(d => d.niveau)));
    return unique.sort((a, b) => order.indexOf(a) - order.indexOf(b));
}

function getAllCategories() {
    return Array.from(new Set(allData.map(d => d.kategori))).sort();
}

function initConfig() {
    selectedLevels = ['12. kyu'];
    selectedCategories = ['Spark', 'Stillinger', 'Stød og slag', 'Parader'];
    renderConfig();
}

function renderConfig() {
    const levelsHtml = getAllLevels().map(level => 
        `<button class="${selectedLevels.includes(level) ? 'selected' : ''}" onclick="toggleLevel('${level}')">${level}</button>`
    ).join('');
    document.getElementById('levels-group').innerHTML = levelsHtml;
    
    const categoriesHtml = getAllCategories().map(cat => 
        `<button class="${selectedCategories.includes(cat) ? 'selected' : ''}" onclick="toggleCategory('${cat}')">${cat}</button>`
    ).join('');
    document.getElementById('categories-group').innerHTML = categoriesHtml;
}

function toggleLevel(level) {
    if (selectedLevels.includes(level)) {
        selectedLevels = selectedLevels.filter(l => l !== level);
    } else {
        selectedLevels.push(level);
    }
    renderConfig();
}

function toggleCategory(cat) {
    if (selectedCategories.includes(cat)) {
        selectedCategories = selectedCategories.filter(c => c !== cat);
    } else {
        selectedCategories.push(cat);
    }
    renderConfig();
}

function startQuiz() {
    if (selectedLevels.length === 0 || selectedCategories.length === 0) {
        alert('Vælg mindst ét niveau og en kategori!');
        return;
    }
    
    quizItems = allData.filter(d => 
        selectedLevels.includes(d.niveau) && selectedCategories.includes(d.kategori)
    ).sort(() => Math.random() - 0.5);
    
    currentIndex = 0;
    revealed = false;
    correctCount = 0;
    
    showScreen('quiz-screen');
    renderQuiz();
}

function renderQuiz() {
    const item = quizItems[currentIndex];
    currentJapanese = item.japansk;
    
    const percent = ((currentIndex) / quizItems.length) * 100;
    document.getElementById('progress-bar').style.width = percent + '%';
    document.getElementById('progress-text').textContent = (currentIndex + 1) + ' / ' + quizItems.length;
    
    if (revealed) {
        document.getElementById('card-content').innerHTML = '<div class="label">Dansk:</div>' + item.dansk;
        document.getElementById('feedback-buttons').style.display = 'flex';
    } else {
        document.getElementById('card-content').innerHTML = item.japansk;
        document.getElementById('feedback-buttons').style.display = 'none';
    }
    
    document.getElementById('quiz-card').className = revealed ? 'card revealed' : 'card';
    document.getElementById('correct-count').textContent = correctCount;
}

function revealAnswer() {
    if (revealed) return;
    revealed = true;
    renderQuiz();
}

function speak() {
    responsiveVoice.speak(currentJapanese, "Japanese Female");
}

function markCorrect() {
    correctCount++;
    nextQuestion();
}

function markWrong() {
    nextQuestion();
}

function nextQuestion() {
    currentIndex++;
    revealed = false;
    
    if (currentIndex >= quizItems.length) {
        const percentage = Math.round((correctCount / quizItems.length) * 100);
        document.getElementById('result-score').textContent = correctCount + ' / ' + quizItems.length;
        document.getElementById('result-percent').textContent = percentage + '%';
        showScreen('result-screen');
    } else {
        renderQuiz();
    }
}

function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(name).classList.add('active');
}

function goBack() {
    showScreen('config-screen');
    initConfig();
}

initConfig();
</script>

</body>
</html>
